<!doctype html>
<html lang="ko" xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>회원가입</title>
    <style>
    </style>
</head>
<body>
    <form th:action="@{/members/join}" method="post" th:object="${memberVO}">
        <input type="text" th:field="*{memberEmail}" name="memberEmail" placeholder="이메일을 입력하세요">
        <input type="password" th:field="*{memberPassword}" name="memberPassword" placeholder="비밀번호를 입력하세요">
        <input type="text" th:field="*{memberName}" name="memberName" placeholder="이름을 입력하세요">
        <button type="submit">회원가입</button>
    </form>
</body>
<script>
    // 유효성 검사 로직
    const inputs = document.querySelectorAll("input");
    const btn = document.querySelector("button");
    const form = document.querySelector("form");

    btn.addEventListener("click", () => {
        for(let input of inputs){
            if(!input.value) return alert(input.name + " 값이 없습니다.");
        }
        form.submit();
    });
</script>
</html>

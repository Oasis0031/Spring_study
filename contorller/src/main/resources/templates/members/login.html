<!doctype html>
<html lang="ko" xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>회원가입</title>
    <style>
        input {
            display: block;
        }
    </style>
</head>
<body>
    <form th:action="@{/members/login}" method="post" th:object="${memberVO}">
        <input type="text" th:field="*{memberEmail}" name="memberEmail" placeholder="이메일을 입력하세요">
        <input type="password" th:field="*{memberPassword}" name="memberPassword" placeholder="비밀번호를 입력하세요">
        <button type="submit">로그인</button>
    </form>
</body>
<script th:inline="javascript">
    console.log([[${isLogin}]])
    const input = document.querySelectorAll('input');
    const btn = document.querySelectorAll('button');
    const form = document.querySelector('form');

    if(isLogin != null) {
        alert("아이디 또는 비밀번호를 확인.")
    }

    btn.addEventListener("click", () => {
        for(let input of inputs){
            if(!input.value) return alert(input.name + " 값이 없습니다.");
        }
        form.submit();
    });
    // 로그인 로직
    // 아이디 일치하는지 확인
    // 비밀번호 일치하는 지 확인
    // 둘 다 일치하면 플래그를 true로 변경,
    // 플래그가 true라면 마이페이지로 이동시키기




</script>
</html>

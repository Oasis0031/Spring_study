<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>게시글</title>
</head>
<body>
  <div th:if="${post != null}" th:object="${post}">
      <h1>게시글 상세 정보</h1>
      <p>번호: <span th:text="*{id}"></span> </p>
      <p>제목: <span th:text="*{postTitle}"></span> </p>
      <p>내용: <span th:text="*{postContent}"></span> </p>
      <p>조회수: <span th:text="*{postReadCount}"></span> </p>
  </div>
</body>
</html>

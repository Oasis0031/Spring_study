<!doctype html>
<html lang="en" xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>로그인</title>
</head>
<body>

<form th:action="@{/members/login}" method="post" th:object="${memberVO}">
    <input type="text" th:field="*{memberEmail}" placeholder="이메일 입력ㄱㄱ">
    <input type="password" th:field="*{memberPassword}" placeholder="비번 입력ㄱㄱ">
    <button type="button">로그인</button>
</form>

</body>
<script th:inline="javascript">
    const isLogin = [[${isLogin}]];

    const inputs = document.querySelectorAll('input');
    const btn = document.querySelector('button');
    const form = document.querySelector('form');

    if(isLogin !== false) {
        alert("아이디 또는 비밀번호를 확인할 것")
    }

    btn.addEventListener('click', () => {
        for (let input of inputs) {
            if(!input.value) return alert("입력이 잘못되었습니다.");
        }
        form.submit();
    })

</script>
</html>

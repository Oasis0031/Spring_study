<!doctype html>
<html lang="en" xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>마이페이지</title>
</head>
<body>

<div th:object="${session.member}">
    <h1 id="memberEmail" th:text="*{memberEmail}"></h1>
    <h1 id="memberName" th:text="*{memberName}"></h1>
</div>


    <button type="button" onclick="window.location.href='/members/login'">로그아웃</button>
    <button type="button" onclick="window.location.href='/members/update'">회원정보수정</button>
    <button id="delete-btn" type="button">회원탈퇴</button>

</body>
<script>

    const deleteBtn = document.getElementById('delete-btn');
    deleteBtn.addEventListener('click',  () => {
        fetch("/members/delete", {
            "method": "DELETE",
        })
    })


</script>
</html>
